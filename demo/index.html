<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>@dalin/tactile</title>
    <style>
      :root {
        --bg: #14130f;
        --surface: #1f1d17;
        --border: #353129;
        --fg: #f3efe4;
        --muted: #a39c89;
        --accent: oklch(0.78 0.15 90);
        --accent-ink: #2a2200;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        background: radial-gradient(120% 80% at 50% 0%, #1d1b14, var(--bg));
        color: var(--fg);
        font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        -webkit-tap-highlight-color: transparent;
        display: grid;
        place-items: start center;
        padding: 32px 20px 64px;
      }
      main { width: 100%; max-width: 460px; }
      h1 { font-size: 28px; margin: 0; letter-spacing: -0.02em; }
      h1 b { color: var(--accent); font-weight: 800; }
      .sub { color: var(--muted); margin: 4px 0 24px; }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
      .row + .row { margin-top: 12px; }
      label.tog { display: inline-flex; gap: 8px; align-items: center; cursor: pointer; user-select: none; }
      input[type="range"] { accent-color: var(--accent); flex: 1; }
      .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: #26241c;
        color: var(--fg);
        font: inherit;
        font-weight: 600;
        padding: 14px 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      button:hover { border-color: var(--accent); }
      button:active { background: #2e2b20; }
      button.accent { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
      .span2 { grid-column: 1 / -1; }
      pre {
        background: #100f0b;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        font-size: 12px;
        color: var(--muted);
        overflow: auto;
        max-height: 240px;
        white-space: pre-wrap;
        margin: 0;
      }
      .hint { color: var(--muted); font-size: 13px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <main>
      <h1><b>@dalin/tactile</b></h1>
      <p class="sub">haptics · sound · motion — one call, three channels.</p>

      <div class="panel">
        <div class="row">
          <label class="tog"><input type="checkbox" id="ch-haptics" checked /> haptics</label>
          <label class="tog"><input type="checkbox" id="ch-sound" checked /> sound</label>
          <label class="tog"><input type="checkbox" id="ch-motion" checked /> motion</label>
        </div>
        <div class="row">
          <span style="color: var(--muted)">strength</span>
          <input type="range" id="strength" min="0" max="1.5" step="0.05" value="1" />
          <span id="strength-val" style="width: 2.5em; text-align: right">1.0</span>
        </div>
      </div>

      <div class="panel">
        <div class="grid">
          <button data-ev="selection">selection</button>
          <button data-ev="light">light</button>
          <button data-ev="medium">medium</button>
          <button data-ev="heavy">heavy</button>
          <button data-ev="success" class="accent">success 🎉</button>
          <button data-ev="warning">warning</button>
          <button data-ev="error">error</button>
          <button id="testall" class="span2">▶ test all (sequence)</button>
        </div>
        <p class="hint">Tip: haptics only fire on a phone. On desktop you'll see motion and (with sound on) hear the synth.</p>
      </div>

      <div class="panel">
        <button id="diag" class="span2" style="width: 100%; margin-bottom: 12px">diagnose() — why isn't it firing?</button>
        <pre id="out">tap a button…</pre>
      </div>
    </main>

    <script type="module">
      import { createTactile } from "../dist/index.js";

      const t = createTactile({ haptics: true, sound: true, motion: true, debug: true });
      window.tactile = t; // exposed for quick console / preview debugging
      const $ = (id) => document.getElementById(id);

      // Beacon telemetry back to the dev server so it can be read from the logs.
      function beacon(type, extra) {
        try {
          fetch("/log", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ type, ...extra, ua: navigator.userAgent }),
            keepalive: true,
          });
        } catch {}
      }

      function sync() {
        $("strength-val").textContent = (+$("strength").value).toFixed(2);
        t.set({
          haptics: $("ch-haptics").checked,
          sound: $("ch-sound").checked,
          motion: $("ch-motion").checked,
          strength: +$("strength").value,
        });
      }
      ["ch-haptics", "ch-sound", "ch-motion", "strength"].forEach((id) =>
        $(id).addEventListener("input", sync),
      );

      document.querySelectorAll("[data-ev]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          sync();
          const ev = btn.dataset.ev;
          t[ev](e);
          beacon("event", { event: ev, report: t.diagnose() });
        });
      });
      $("testall").addEventListener("click", () => {
        sync();
        t.test();
        beacon("test-all", { report: t.diagnose() });
      });
      $("diag").addEventListener("click", () => {
        const report = t.diagnose();
        $("out").textContent = JSON.stringify(report, null, 2);
        beacon("diagnose", { report });
      });
      sync();
      beacon("load", { report: t.diagnose() });
    </script>
  </body>
</html>
